components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "opaque-token"
    basicAuth:
      type: "http"
      scheme: "basic"
  responses:
    BadRequest:
      description: "Некорректный запрос"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: "Нет доступа или неверный токен"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: "Запрос корректен синтаксически, но не может быть обработан бизнес-логикой"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: "Ошибка 1C-сервиса"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: "object"
      required:
        - "ok"
        - "error"
      properties:
        ok:
          type: "boolean"
          enum:
            - false
        error:
          type: "string"
          example: "validation_error"
        message:
          type: "string"
          example: "Не указан date_from"
        request_id:
          type: "string"
        details:
          type: "object"
          additionalProperties: true
      additionalProperties: true
    HealthResponse:
      type: "object"
      required:
        - "ok"
        - "service"
        - "version"
        - "server_time"
        - "read_only"
      properties:
        ok:
          type: "boolean"
          enum:
            - true
        service:
          type: "string"
          example: "1c-reconciliation"
        version:
          type: "string"
          example: "1.0.0"
        configuration:
          type: "string"
          description: "Название конфигурации/базы 1C"
        contract_version:
          type: "string"
          example: "reconciliation.v1"
        timezone:
          type: "string"
          example: "Asia/Novosibirsk"
        server_time:
          type: "string"
          format: "date-time"
        read_only:
          type: "boolean"
          enum:
            - true
      additionalProperties: true
    BaseEntity:
      type: "object"
      required:
        - "source_system"
        - "source_id"
      properties:
        source_system:
          type: "string"
          enum:
            - "1c"
        source_id:
          type: "string"
          description: "Уникальный идентификатор объекта 1C, желательно GUID ссылки"
        source_ref:
          type: "string"
          description: "Представление ссылки/кода 1C"
        source_version:
          type: "string"
          description: "Версия DTO или конфигурации 1C"
        posted:
          type: "boolean"
        deleted:
          type: "boolean"
        status:
          type: "string"
          enum:
            - "posted"
            - "draft"
            - "deleted"
            - "unposted"
            - "unknown"
        updated_at:
          type: "string"
          format: "date-time"
        hash:
          type: "string"
          description: "Хэш бизнес-полей DTO"
      additionalProperties: true
    CounterpartyDto:
      allOf:
        -
          $ref: "#/components/schemas/BaseEntity"
        -
          type: "object"
          properties:
            code:
              type: "string"
            name:
              type: "string"
            full_name:
              type: "string"
            inn:
              type: "string"
            kpp:
              type: "string"
            legal_type:
              type: "string"
              enum:
                - "legal_entity"
                - "individual"
                - "separate_division"
                - "government"
                - "unknown"
            parent_counterparty_id:
              type: "string"
              nullable: true
    ContractDto:
      allOf:
        -
          $ref: "#/components/schemas/BaseEntity"
        -
          type: "object"
          properties:
            code:
              type: "string"
              description: "Код договора 1C: Справочник.ДоговорыКонтрагентов.Код. Для поставки должен совпадать с ERP veda_specs.f_kod1cb или veda_specs.f_kod1cp."
            number:
              type: "string"
              description: "Номер договора 1C. Контрольное поле, не основной ключ при наличии code."
            date:
              type: "string"
              format: "date"
              description: "Дата договора 1C. Для договора-заявки сверяется с ERP veda_specs.f_dt."
            name:
              type: "string"
            counterparty_id:
              type: "string"
            organization_id:
              type: "string"
            contract_type:
              type: "string"
            role:
              type: "string"
              enum:
                - "buyer"
                - "committent"
                - "supplier"
                - "agent"
                - "related"
                - "unknown"
            parent_contract_id:
              type: "string"
              nullable: true
            base_contract:
              type: "string"
              description: "Базовый договор, если может быть выведен; контрольное поле."
            spec_number:
              type: "string"
              description: "Бизнес-номер заявки/спецификации; контрольное поле."
            currency:
              type: "string"
    DocumentBase:
      allOf:
        -
          $ref: "#/components/schemas/BaseEntity"
        -
          type: "object"
          required:
            - "document_type"
            - "number"
            - "date"
          properties:
            document_type:
              type: "string"
            number:
              type: "string"
            date:
              type: "string"
              format: "date"
            organization_id:
              type: "string"
            organization_code:
              type: "string"
            counterparty_id:
              type: "string"
            counterparty_code:
              type: "string"
            contract_id:
              type: "string"
            contract_code:
              type: "string"
            contract_number:
              type: "string"
            base_contract:
              type: "string"
            spec_number:
              type: "string"
            amount_without_vat:
              type: "number"
              format: "double"
            vat_amount:
              type: "number"
              format: "double"
            amount_total:
              type: "number"
              format: "double"
            currency:
              type: "string"
              example: "RUB"
            comment:
              type: "string"
            incoming_number:
              type: "string"
              description: "Входящий номер документа/номер платежного поручения/номер документа поставщика. Не равен внутреннему номеру документа 1C."
            incoming_date:
              type: "string"
              format: "date"
              nullable: true
              description: "Дата входящего документа, если есть."
            linked_contract_codes:
              type: "array"
              items:
                type: "string"
              description: "Коды договоров 1C с покупателем/комитентом, из-за которых документ включен в снимок, если прямой contract_code документа указывает на договор поставщика или другой связанный договор."
    CustomerInvoiceDto:
      allOf:
        -
          $ref: "#/components/schemas/DocumentBase"
        -
          type: "object"
          properties:
            document_type:
              type: "string"
              enum:
                - "customer_invoice"
            payment_status:
              type: "string"
