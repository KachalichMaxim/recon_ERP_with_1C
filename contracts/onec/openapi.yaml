openapi: "3.0.3"
info:
  title: "1C Reconciliation Read-only GET API"
  version: "1.1.0"
  description: "GET-only REST API 1C для Python-сервиса сверки ERP vs 1C. API отдает нормализованные DTO и не публикует сырые OData-объекты 1C."
servers:
  -
    url: "https://1c.example.local"
    description: "Production 1C base URL"
  -
    url: "https://1c-test.example.local"
    description: "Test 1C base URL"
security:
  -
    bearerAuth: []
  -
    basicAuth: []
tags:
  -
    name: "Health"
    description: "Проверка доступности 1C REST API."
  -
    name: "Snapshot"
    description: "Интерактивный GET-снимок 1C для сверки поставки/договора/клиента."
  -
    name: "Collections"
    description: "GET-коллекции для фонового runner-а и инкрементальной сверки."
paths:
  /reconciliation/v1/health:
    get:
      tags:
        - "Health"
      operationId: "getReconciliationHealth"
      summary: "Проверить доступность read-only API 1C"
      responses:
        200:
          description: "Сервис доступен"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        401:
          $ref: "#/components/responses/Unauthorized"
        500:
          $ref: "#/components/responses/InternalError"
  /reconciliation/v1/snapshot:
    get:
      tags:
        - "Snapshot"
      operationId: "getReconciliationSnapshot"
      summary: "Получить GET-снимок 1C для сверки"
      description: "Основной endpoint интерактивной сверки. Все входные данные передаются query-параметрами. Для поставки основной ключ поиска в 1C — buyer_contract_code/committent_contract_code или повторяемый contract_code по Справочник.ДоговорыКонтрагентов.Код. Минимально нужны date_from/date_to и один бизнес-фильтр: buyer_contract_code, committent_contract_code, contract_code, counterparty_code, counterparty_inn или document_code."
      parameters:
        -
          name: "request_id"
          in: "query"
          required: false
          description: "Технический id запроса Python backend. 1C не использует его для поиска, а возвращает в ответе для трассировки."
          schema:
            type: "string"
        -
          name: "scope"
          in: "query"
          required: false
          description: "Область поиска. scope=delivery учитывает связь договора заявки в шапке, табличных частях и расшифровках платежей."
          schema:
            type: "string"
            enum:
              - "delivery"
        -
          name: "contract_version"
          in: "query"
          required: false
          description: "Версия контракта DTO"
          schema:
            type: "string"
            default: "reconciliation.v1"
        -
          name: "date_from"
          in: "query"
          required: true
          description: "Начало периода поиска документов 1C. Обязательно."
          schema:
            type: "string"
            format: "date"
        -
          name: "date_to"
          in: "query"
          required: true
          description: "Конец периода поиска документов 1C. Обязательно."
          schema:
            type: "string"
            format: "date"
        -
          name: "organization_code"
          in: "query"
          required: false
          description: "Код организации в 1C. Передается, если известен."
          schema:
            type: "string"
        -
          name: "organization_inn"
          in: "query"
          required: false
          description: "ИНН организации. Используется, если код 1C неизвестен."
          schema:
            type: "string"
        -
          name: "organization_name"
          in: "query"
          required: false
          description: "Наименование организации для резервного поиска."
          schema:
            type: "string"
        -
          name: "counterparty_code"
          in: "query"
          required: false
          description: "Код контрагента в 1C. Передается, если известен."
          schema:
            type: "string"
        -
          name: "counterparty_inn"
          in: "query"
          required: false
          description: "ИНН ЮЛ клиента/контрагента. Основной резервный признак для поиска контрагента."
          schema:
            type: "string"
        -
          name: "counterparty_name"
          in: "query"
          required: false
          description: "Наименование ЮЛ клиента/контрагента для резервного поиска."
          schema:
            type: "string"
        -
          name: "buyer_contract_code"
          in: "query"
          required: false
          description: "Код договора 1C с покупателем из ERP veda_specs.f_kod1cb. Основной точный фильтр поставки по Справочник.ДоговорыКонтрагентов.Код."
          schema:
            type: "string"
        -
          name: "committent_contract_code"
          in: "query"
          required: false
          description: "Код договора 1C с комитентом / агентского договора из ERP veda_specs.f_kod1cp. Основной точный фильтр поставки по Справочник.ДоговорыКонтрагентов.Код."
          schema:
            type: "string"
        -
          name: "contract_code"
          in: "query"
          required: false
          description: "Повторяемый список кодов договоров 1C для фильтра по Справочник.ДоговорыКонтрагентов.Код. Для поставки включает f_kod1cb/f_kod1cp; это основной ключ связи ERP с 1C."
          schema:
            type: "array"
            items:
              type: "string"
          style: "form"
          explode: true
        -
          name: "contract_number"
          in: "query"
          required: false
          description: "Номер договора. Контрольный или резервный признак; не основной ключ поставки, если переданы коды договоров 1C."
          schema:
            type: "array"
            items:
              type: "string"
          style: "form"
          explode: true
        -
          name: "contract_role"
          in: "query"
          required: false
          description: "Роль договора в ERP-контексте. Повторяемый query-параметр, порядок не используется как связь."
          schema:
            type: "array"
            items:
              type: "string"
              enum:
                - "buyer"
                - "committent"
                - "supplier"
                - "agent"
                - "related"
          style: "form"
          explode: true
        -
          name: "base_contract"
          in: "query"
          required: false
          description: "Номер базового договора. Только контрольная подсказка; не заменяет поиск по коду договора 1C."
          schema:
            type: "string"
        -
          name: "spec_number"
          in: "query"
          required: false
          description: "Бизнес-номер заявки/спецификации из ERP. Контрольное поле; не заменяет поиск по коду договора 1C."
          schema:
            type: "string"
        -
          name: "document_code"
          in: "query"
          required: false
          description: "Коды/номера 1C документов для точного ограничения выборки. Передаются только если ERP уже знает код 1C документа."
          schema:
            type: "array"
            items:
              type: "string"
          style: "form"
          explode: true
        -
          name: "document_number"
          in: "query"
          required: false
          description: "Номера документов для резервного поиска. Повторяемый query-параметр."
          schema:
            type: "array"
            items:
              type: "string"
          style: "form"
          explode: true
        -
          name: "document_type"
          in: "query"
          required: false
          description: "Типы документов, которые нужно вернуть. Повторяемый query-параметр."
          schema:
            type: "array"
            items:
              type: "string"
              enum:
                - "customer_invoice"
                - "payment"
                - "sale"
                - "purchase"
                - "closing_document"
                - "account_movement"
          style: "form"
          explode: true
        -
          name: "include"
          in: "query"
          required: false
          description: "Состав блоков ответа snapshot. Это не фильтр поиска документов; параметр только ограничивает, какие массивы вернуть: contracts, customer_invoices, payments, sales, purchases, document_lines, account_movements, balances."
          schema:
            type: "array"
            items:
              type: "string"
              enum:
                - "counterparties"
                - "contracts"
                - "customer_invoices"
                - "payments"
                - "sales"
                - "purchases"
                - "document_lines"
                - "account_movements"
                - "balances"
          style: "form"
          explode: true
        -
          name: "cursor"
          in: "query"
          required: false
          description: "Курсор следующей страницы, если ответ слишком большой."
          schema:
            type: "string"
        -
          name: "limit"
          in: "query"
          required: false
          description: "Максимум элементов на блок/страницу. По умолчанию 500, максимум 2000."
          schema:
            type: "integer"
            default: 500
            minimum: 1
            maximum: 2000
      responses:
        200:
          description: "Снимок сформирован"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotResponse"
        400:
          $ref: "#/components/responses/BadRequest"
        401:
          $ref: "#/components/responses/Unauthorized"
        422:
          $ref: "#/components/responses/ValidationError"
        500:
          $ref: "#/components/responses/InternalError"
