<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Акт сверки — ЕРП ↔ 1С</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(0.985 0.004 85);
    --bg-sunken: oklch(0.97 0.005 85);
    --surface: #ffffff;
    --surface-2: oklch(0.98 0.004 85);
    --border: oklch(0.92 0.005 85);
    --border-strong: oklch(0.86 0.007 80);
    --ink: oklch(0.22 0.01 70);
    --ink-2: oklch(0.38 0.01 70);
    --muted: oklch(0.55 0.01 70);
    --muted-2: oklch(0.68 0.008 70);

    --match: oklch(0.68 0.14 155);
    --match-bg: oklch(0.96 0.04 155);
    --match-border: oklch(0.87 0.07 155);

    --miss-erp: oklch(0.74 0.15 75);
    --miss-erp-bg: oklch(0.97 0.04 80);
    --miss-erp-border: oklch(0.88 0.1 78);

    --miss-1c: oklch(0.66 0.16 45);
    --miss-1c-bg: oklch(0.97 0.035 50);
    --miss-1c-border: oklch(0.86 0.1 48);

    --sum-mismatch: oklch(0.6 0.19 25);
    --sum-mismatch-bg: oklch(0.96 0.04 25);
    --sum-mismatch-border: oklch(0.84 0.11 25);

    --vat: oklch(0.58 0.15 290);
    --vat-bg: oklch(0.96 0.035 290);
    --vat-border: oklch(0.85 0.09 290);

    --brand: oklch(0.52 0.13 235);
    --brand-2: oklch(0.45 0.14 235);
    --brand-bg: oklch(0.96 0.03 235);

    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 0 oklch(0.9 0.005 80 / 0.8), 0 1px 2px oklch(0.2 0.01 70 / 0.04);
    --shadow-md: 0 1px 0 oklch(0.9 0.005 80 / 0.8), 0 4px 10px oklch(0.2 0.01 70 / 0.06), 0 12px 28px oklch(0.2 0.01 70 / 0.06);
    --shadow-lg: 0 20px 50px oklch(0.2 0.01 70 / 0.15), 0 6px 16px oklch(0.2 0.01 70 / 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  button { font-family: inherit; color: inherit; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'zero' 1, 'ss01' 1; }
  .tight { font-family: 'Inter Tight', 'Inter', sans-serif; letter-spacing: -0.01em; }

  /* ================= App shell ================= */
  .app-root { display: flex; min-height: 100vh; background: var(--bg); }
  .sidebar { width: 240px; border-right: 1px solid var(--border); background: var(--surface); padding: 18px 14px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; gap: 18px; flex-shrink: 0; }
  .sidebar .logo { display: flex; align-items: center; gap: 10px; padding: 4px 6px 12px; border-bottom: 1px solid var(--border); }
  .logo-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--ink); color: #fff; display: grid; place-items: center; font-family: 'Inter Tight'; font-weight: 700; font-size: 13px; letter-spacing: -0.02em; }
  .logo-name { font-family: 'Inter Tight'; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .nav-section { display: flex; flex-direction: column; gap: 1px; }
  .nav-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-2); padding: 8px 8px 4px; font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 8px; font-size: 13px; color: var(--ink-2); cursor: pointer; font-weight: 500; }
  .nav-item:hover { background: var(--bg-sunken); color: var(--ink); }
  .nav-item.active { background: var(--ink); color: #fff; }
  .nav-item .count { margin-left: auto; font-size: 11px; color: var(--muted); }
  .nav-item.active .count { color: oklch(0.8 0.01 70); }

  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; padding: 0 22px; gap: 16px; position: sticky; top: 0; z-index: 5; }
  .crumbs { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .crumbs .sep { color: var(--muted-2); }
  .crumbs .current { color: var(--ink); font-weight: 500; }
  .top-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .user-chip { display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 4px; border-radius: 999px; border: 1px solid var(--border); font-size: 12px; color: var(--ink-2); }
  .user-chip .avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, oklch(0.72 0.12 60), oklch(0.62 0.14 35)); color: #fff; display: grid; place-items: center; font-size: 10.5px; font-weight: 600; }
  .user-chip .user-meta { display: grid; line-height: 1.05; }
  .user-chip .user-name { font-weight: 600; color: var(--ink); }
  .user-chip .user-email { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .user-chip .user-logout { border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 10px; padding: 2px 0 0; cursor: pointer; text-align: left; }
  .user-chip .user-logout:hover { color: var(--ink); }
  .auth-shell { min-height: 100vh; display: grid; place-items: center; background: var(--bg); padding: 24px; }
  .auth-panel { width: min(440px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 26px; }
  .auth-title { font-family: 'Inter Tight'; font-size: 24px; font-weight: 700; margin: 0 0 6px; }
  .auth-sub { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 20px; }
  .auth-token-slot { min-height: 44px; display: flex; align-items: center; }
  .auth-status { margin-top: 14px; padding: 10px 12px; border-radius: var(--radius); background: var(--bg-sunken); border: 1px solid var(--border); font-size: 12px; color: var(--ink-2); line-height: 1.45; }
  .auth-error { border-color: oklch(0.78 0.13 25); background: oklch(0.97 0.025 25); color: oklch(0.42 0.15 25); }

  .page { padding: 24px 28px 48px; max-width: 1600px; width: 100%; margin: 0 auto; flex: 1; }

  /* ================= Buttons ================= */
  .btn { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--border); background: var(--surface); color: var(--ink); padding: 7px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.12s, border-color 0.12s, transform 0.06s; }
  a.btn { text-decoration: none; }
  .btn:hover { background: var(--bg-sunken); border-color: var(--border-strong); }
  .btn:active { transform: translateY(0.5px); }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { background: oklch(0.3 0.01 70); }
  .btn.brand { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn.brand:hover { background: var(--brand-2); }
  .btn.ghost { background: transparent; border-color: transparent; }
  .btn.ghost:hover { background: var(--bg-sunken); }
  .btn.sm { padding: 4px 9px; font-size: 12px; gap: 5px; border-radius: 7px; }
  .btn.xs { padding: 2px 7px; font-size: 11.5px; gap: 4px; border-radius: 6px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ================= Status chips ================= */
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; font-size: 11.5px; font-weight: 500; border: 1px solid transparent; white-space: nowrap; }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .chip.match { background: var(--match-bg); color: oklch(0.35 0.1 155); border-color: var(--match-border); }
  .chip.match .dot { background: var(--match); }
  .chip.miss-erp { background: var(--miss-erp-bg); color: oklch(0.42 0.12 75); border-color: var(--miss-erp-border); }
  .chip.miss-erp .dot { background: var(--miss-erp); }
  .chip.miss-1c { background: var(--miss-1c-bg); color: oklch(0.4 0.14 45); border-color: var(--miss-1c-border); }
  .chip.miss-1c .dot { background: var(--miss-1c); }
  .chip.sum { background: var(--sum-mismatch-bg); color: oklch(0.4 0.15 25); border-color: var(--sum-mismatch-border); }
  .chip.sum .dot { background: var(--sum-mismatch); }
  .chip.vat { background: var(--vat-bg); color: oklch(0.38 0.13 290); border-color: var(--vat-border); }
  .chip.vat .dot { background: var(--vat); }
  .chip.fields, .chip.source-error { background: var(--miss-erp-bg); color: oklch(0.42 0.12 75); border-color: var(--miss-erp-border); }
  .chip.fields .dot, .chip.source-error .dot { background: var(--miss-erp); }
  .chip.neutral { background: var(--bg-sunken); color: var(--muted); border-color: var(--border); }
  .chip.neutral .dot { background: var(--muted-2); }
  .chip.pending { background: var(--brand-bg); color: var(--brand-2); border-color: oklch(0.85 0.08 235); }
  .chip.pending .dot { background: var(--brand); }
  .chip.no-kod1c { background: var(--panel); color: var(--muted); border-color: var(--border-strong); }
  .chip.no-kod1c .dot { background: var(--muted); }

  /* ================= Cards ================= */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .card-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .card-title { font-family: 'Inter Tight'; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .card-sub { font-size: 12px; color: var(--muted); }

  /* ================= KV ================= */
  .kv { display: grid; grid-template-columns: 150px 1fr; row-gap: 10px; column-gap: 18px; font-size: 13px; }
  .kv dt { color: var(--muted); font-weight: 500; }
  .kv dd { margin: 0; color: var(--ink); }

  /* ================= Delivery card (screen 1) ================= */
  .delivery-head { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
  .delivery-title { font-family: 'Inter Tight'; font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .delivery-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .delivery-cta { display: flex; gap: 8px; }
  .delivery-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 18px; }
  .stat { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; background: var(--surface-2); }
  .stat-val { font-family: 'Inter Tight'; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .stat-label { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

  .last-sync { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-sunken); border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }

  /* ================= Doc table (delivery) ================= */
  .doc-list { width: 100%; border-collapse: collapse; font-size: 13px; }
  .doc-list th { text-align: left; font-weight: 500; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg-sunken); }
  .doc-list td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .doc-list tr:last-child td { border-bottom: none; }
  .doc-list tr:hover td { background: var(--bg-sunken); }
  .subline { color: var(--muted); font-size: 11.5px; margin-top: 2px; line-height: 1.35; }

  .source-banner { display: flex; align-items: center; gap: 9px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--ink-2); font-size: 12.5px; margin-bottom: 14px; }
  .source-banner.warn { background: var(--miss-1c-bg); border-color: var(--miss-1c-border); color: oklch(0.4 0.14 45); }
  .source-banner.ok { background: var(--match-bg); border-color: var(--match-border); color: oklch(0.34 0.1 155); }
  .source-banner .link { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }

  .settlement-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .settlement-item { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 10px 12px; min-width: 0; }
  .settlement-value { font-family: 'Inter Tight'; font-size: 18px; font-weight: 600; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .settlement-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; line-height: 1.3; }

  .balance-card { border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-lg); margin-bottom: 18px; overflow: hidden; }
  .balance-head { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: start; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .balance-title { font-family: 'Inter Tight'; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .balance-sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .balance-status { display: inline-flex; align-items: center; gap: 7px; border-radius: 999px; border: 1px solid var(--border); padding: 4px 9px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .balance-status.closed { color: oklch(0.35 0.1 155); background: var(--match-bg); border-color: var(--match-border); }
  .balance-status.money_closed { color: var(--brand-2); background: var(--brand-bg); border-color: oklch(0.85 0.08 235); }
  .balance-status.open_balance { color: oklch(0.42 0.12 45); background: var(--miss-1c-bg); border-color: var(--miss-1c-border); }
  .balance-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0; }
  .balance-metric { padding: 14px 18px; border-right: 1px solid var(--border); min-width: 0; }
  .balance-metric:last-child { border-right: none; }
  .balance-metric .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .balance-metric .value { font-family: 'Inter Tight'; font-size: 23px; font-weight: 600; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .balance-metric .detail { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .balance-foot { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 12px 18px; border-top: 1px solid var(--border); background: var(--surface-2); font-size: 12px; color: var(--ink-2); }
  .balance-foot .warn { color: oklch(0.45 0.14 45); font-weight: 600; }
  .balance-foot .ok { color: oklch(0.36 0.1 155); font-weight: 600; }

  .contract-list { display: flex; flex-direction: column; gap: 8px; }
  .contract-row { border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; background: var(--surface-2); }
  .contract-top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .contract-name { font-family: 'JetBrains Mono'; font-size: 12.5px; font-weight: 600; color: var(--ink); }
  .contract-role { color: var(--muted); font-size: 11.5px; line-height: 1.4; }

  /* ================= Reconciliation matrix ================= */
  .matrix-page { max-width: none; padding: 14px 16px 32px; }
  .matrix-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: start; margin-bottom: 10px; }
  .matrix-title { font-family: 'Inter Tight'; font-size: 20px; font-weight: 600; letter-spacing: 0; }
  .matrix-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .matrix-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .matrix-controls { display: grid; grid-template-columns: minmax(230px, 320px) minmax(260px, 1fr) auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .matrix-select, .matrix-search input {
    width: 100%;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    outline: none;
  }
  .matrix-select { padding: 0 34px 0 11px; }
  .matrix-search { position: relative; }
  .matrix-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .matrix-search input { padding: 0 12px 0 34px; }
  .matrix-kpis { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 6px; margin-bottom: 8px; }
  .matrix-kpi { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); padding: 8px 10px; min-width: 0; }
  .matrix-kpi .v { font-family: 'Inter Tight'; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .matrix-kpi .l { color: var(--muted); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; line-height: 1.2; }
  .matrix-shell { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); overflow: hidden; }
  .matrix-scroll { overflow-y: auto; overflow-x: hidden; max-height: calc(100vh - 220px); min-height: 0; }
  .matrix-table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; font-size: 11px; }
  .matrix-table th {
    position: sticky;
    top: 0;
    z-index: 3;
    background: oklch(0.9 0.006 85);
    color: var(--ink-2);
    text-align: left;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.045em;
    padding: 7px 5px;
    border-bottom: 1px solid var(--border-strong);
    white-space: normal;
    line-height: 1.15;
    overflow-wrap: normal;
  }
  .matrix-table th .th-wrap { display: inline-block; min-width: 0; }
  .matrix-table th:first-child { left: 0; z-index: 5; }
  .matrix-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); background: var(--surface); vertical-align: middle; }
  .matrix-table tr:hover td { background: var(--surface-2); }
  .matrix-table .sticky-col {
    position: sticky;
    left: 0;
    z-index: 2;
    box-shadow: 1px 0 0 var(--border);
  }
  .matrix-table .money, .matrix-table .delta { text-align: right; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; white-space: pre-line; }
  .matrix-table td.mono { white-space: pre-line; }
  .matrix-table .sf-cell { padding-top: 5px; padding-bottom: 5px; }
  .matrix-table .sf-lines {
    max-height: 74px;
    overflow: auto;
    white-space: pre-line;
    line-height: 1.35;
    padding-right: 2px;
  }
  .matrix-table .delta.pos, .matrix-table .delta.neg { color: oklch(0.42 0.15 25); }
  .matrix-row.parent td { font-weight: 650; background: var(--surface-2); }
  .matrix-row.level-0 td { background: oklch(0.965 0.006 85); }
  .matrix-row.level-1 td { background: oklch(0.975 0.005 85); }
  .matrix-row.level-2 td { background: oklch(0.985 0.004 85); }
  .matrix-row.spec td { background: var(--surface); }
  .matrix-row.detail-host td { background: var(--bg-sunken); padding: 0; }
  .matrix-label { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .matrix-expander {
    width: 20px;
    height: 20px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    display: grid;
    place-items: center;
    color: var(--ink-2);
    flex: 0 0 20px;
    cursor: pointer;
  }
  .matrix-expander:hover { border-color: var(--border); background: var(--surface); }
  .matrix-indent { width: calc(var(--level) * 12px); flex: 0 0 calc(var(--level) * 12px); }
  .matrix-main { min-width: 0; }
  .matrix-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.25; }
  .matrix-meta-line { display: flex; align-items: center; gap: 5px; min-width: 0; margin-top: 2px; }
  .matrix-note { color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; min-width: 0; }
  .matrix-badges { display: flex; flex-wrap: nowrap; gap: 3px; min-width: 0; overflow: hidden; }
  .matrix-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 999px;
    border: 1px solid var(--border);
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 650;
    white-space: nowrap;
    background: var(--surface);
    color: var(--ink-2);
  }
  .matrix-badge.ok { background: var(--match-bg); color: oklch(0.34 0.1 155); border-color: var(--match-border); }
  .matrix-badge.no1c { background: var(--miss-1c-bg); color: oklch(0.4 0.14 45); border-color: var(--miss-1c-border); }
  .matrix-badge.noerp { background: var(--miss-erp-bg); color: oklch(0.42 0.12 75); border-color: var(--miss-erp-border); }

const currencyLabel = (cur = 'RUB') => {
  const value = String(cur || 'RUB').trim();
  const key = value.toLowerCase();
  if (!value || key === 'rub' || key === 'rur' || key === 'руб' || key === 'руб.' || key.includes('рубл')) return '₽';
  if (key === 'usd' || key.includes('доллар')) return '$';
  if (key === 'eur' || key.includes('евро')) return '€';
  if (key === 'cny' || key.includes('юан')) return '¥';
  return value;
};
const fmtMoney = (n, cur = 'RUB') => {
  if (n == null) return '—';
  const value = Number(n);
  if (!Number.isFinite(value)) return '—';
  const s = new Intl.NumberFormat('ru-RU', { minimumFractionDigits: Number.isInteger(value) ? 0 : 2, maximumFractionDigits: 2 }).format(value);
  return `${s}\u00a0${currencyLabel(cur)}`;
};
const formatCurrencyBreakdown = (items, defaultTotal = 0) => {
  const rows = Array.isArray(items) ? items.filter(x => Number.isFinite(Number(x?.total))) : [];
  if (!rows.length) return fmtMoney(defaultTotal);
  return rows
    .map(x => fmtMoney(Number(x.total || 0), x.currency || 'RUB'))
    .join(' · ');
};
const groupBy = (arr, fn) => arr.reduce((m, x) => { const k = fn(x); (m[k] ||= []).push(x); return m; }, {});

  const text = String(header || '');
  const utfMatch = text.match(/filename\*=UTF-8''([^;]+)/i);
  if (utfMatch) return decodeURIComponent(utfMatch[1]);
  const match = text.match(/filename="?([^";]+)"?/i);

  diffNote: 'ERP-оплата подключена. Для сверки запустите REST-сверку с 1С.',
});

const applyErpSnapshot = (snapshot) => {
  window.ERP_SNAPSHOT = {
    ...snapshot,
    source: 'erp',
    sourceState: 'loaded',
    settlements: snapshot.settlements || window.ERP_SNAPSHOT.settlements,
    delivery_balance: snapshot.delivery_balance || window.ERP_SNAPSHOT.delivery_balance,
    contracts: Array.isArray(snapshot.contracts) ? snapshot.contracts : [],
  };
  window.DELIVERY = normalizeDeliveryFromSnapshot(snapshot);
  const erpDocs = [
    ...(Array.isArray(snapshot.schets) ? snapshot.schets : []),
    ...(Array.isArray(snapshot.akts) ? snapshot.akts : []),
  ].map(normalizeDocFromSnapshot);
  const paymentDocs = (Array.isArray(snapshot.payments) ? snapshot.payments : []).map(normalizePaymentFromSnapshot);
  const docs = Array.isArray(snapshot.erp_docs) ? snapshot.erp_docs.map(normalizeDocFromSnapshot) : [...erpDocs, ...paymentDocs];
  if (docs.length > 0) window.DOCS = docs;
};

const loadErpSnapshot = async () => {
  const fixture = getFixtureName();
  if (fixture) {
    const resp = await fetch(`./reference/${encodeURIComponent(fixture)}.json`);
    if (!resp.ok) throw new Error(`Не удалось загрузить fixture ${fixture}: HTTP ${resp.status}`);
    const payload = await resp.json();
    applyErpSnapshot(payload);
    return { state: 'loaded', message: `Загружен контрольный набор ERP ${fixture}` };
  }

  const clientId = getClientId();
  if (clientId) {
    const query = new URLSearchParams({ client_id: clientId, limit: getMatrixLimit(), scope: getClientScope(), compare_1c: '0' });
    const dogId = getDogId();
    if (dogId) query.set('dog_id', dogId);
    const resp = await apiFetch(`/api/reconciliation/client-matrix?${query.toString()}`);
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(text || `HTTP ${resp.status}`);
    }
    const payload = await resp.json();
    if (!payload.ok) throw new Error(payload.error || 'ERP client matrix failed');
    applyErpSnapshot(payload);
    return { state: 'loaded', message: `ERP-матрица загружена по client_id ${clientId}` };
  }

  const specId = getSpecId();
  if (!specId) return { state: 'mock', message: 'Откройте страницу с ?client_id=<ID клиента> или ?spec_id=<ID заявки>, чтобы подтянуть ERP-данные.' };
  const resp = await apiFetch(`/api/reconciliation/erp-snapshot?spec_id=${encodeURIComponent(specId)}`);
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(text || `HTTP ${resp.status}`);
  }
  const payload = await resp.json();
  if (!payload.ok) throw new Error(payload.error || 'ERP snapshot failed');
  applyErpSnapshot(payload);
  return { state: 'loaded', message: `ERP-данные загружены по spec_id ${specId}` };
};

const displayDateFromIso = (iso) => {
  const text = String(iso || '');
  if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
  const [y, m, d] = text.split('-');
  return `${d}.${m}.${y}`;
};

const uiStatusFromApi = (status, fields = []) => {
  if (status === 'MATCH') return 'match';
  if (status === 'NOT_FOUND_IN_1C') return 'miss-1c';
  if (status === 'NOT_FOUND_IN_ERP') return 'miss-erp';
  if (status === 'SOURCE_ERROR_1C' || status === 'ONEC_SOURCE_ERROR') return 'source-error';
  if (status === 'NO_SF_UPD' || status === 'NOT_FOUND_SF' || status === 'MISSING_SF') return 'no-sf';
  if (status === 'FIELDS_MISMATCH') {
    if (fields.includes('sum') || fields.includes('amount')) return 'sum';
    if (fields.includes('vat') || fields.includes('nds') || fields.includes('vat_rate')) return 'vat';
    return 'fields';
  }
  if (status === 'NOT_COMPARABLE') return 'no-kod1c';
  return 'pending';
};

    vat: row.erp_reimbursement || '—',

    reimbursement: row.erp_reimbursement || '',
    reimbursementId: Number(row.erp_reimbursement_id || row.erp_f_isvozm || 0),
    dog: row.erp_dog_number || '',
    dogCode1c: row.erp_dog_code1c || '',
    isAggregated,
    aggregationNote: row.erp_aggregation_note || '',
    docCount: row.erp_doc_count || 0,

  } : null;
  const rc = row.onec_number || row.onec_code1c || row.onec_ref_id ? {

    num: row.onec_number || row.onec_code1c || row.onec_ref_id,
    date: displayDateFromIso(row.onec_date_iso),
    amount: row.onec_sum,
    kod1c: row.onec_code1c || row.onec_ref_id || '',
    vat: row.onec_invoice_number ? `Счет ${row.onec_invoice_number}` : '—',
    invoice: row.onec_invoice_number || '',
    reimbursement: row.onec_contract || '',

  } : null;

  return {
    id: `api-${index}`,
    opId: row.oper_id || 0,
    opTitle: row.operation_title || row.onec_contract || row.erp_doc_kind || row.onec_doc_kind || 'Документ сверки',
    typeLabel: erp?.doctype || rc?.doctype || 'Документ',
    status,
    correctNum: row.correct_num ?? row.erp_correct_num ?? row.correct_f_num ?? row.f_correct_num ?? row.report_num ?? 0,
    correctId: row.correct_id ?? row.erp_correct_id ?? row.correctid ?? row.f_correctid ?? row.report_id ?? 0,
    diffFields: fields.map(x => x === 'sum' ? 'amount' : x === 'invoice_number' ? 'invoice' : x),
    diffNote: [
      row.erp_aggregation_note,
      row.note,
    ].filter(Boolean).join(' · '),
    erp,
    rc,
  };
};

  });

const moneyValue = (value) => {
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
};
const balanceLabel = (delta) => moneyValue(delta) > 0.01 ? 'Переплата' : moneyValue(delta) < -0.01 ? 'Долг' : '';
const hasText = (value) => String(value || '').trim().length > 0;
const meaningfulLabel = (value) => {
  const text = String(value || '').trim();
  return text && !['_', '-', '0'].includes(text) ? text : '';
};
const uniqueList = (items) => [...new Set(items.map(x => String(x || '').trim()).filter(Boolean))];
const compactList = (items, empty = '—') => {
  const values = uniqueList(items);
  if (!values.length) return empty;
  return values.length > 2 ? `${values.slice(0, 2).join(', ')} +${values.length - 2}` : values.join(', ');
};
const multiLineList = (items, empty = '—') => {
  const values = uniqueList(items);
  return values.length ? values.join('\n') : empty;
};
const docAmount = (doc) => moneyValue(doc?.erp?.amount ?? doc?.rc?.amount);
const docDate = (doc) => doc?.erp?.date || doc?.rc?.date || '';
const docNumber = (doc) => doc?.erp?.num || doc?.rc?.num || doc?.erp?.kod1c || doc?.rc?.kod1c || '';
const isInvoiceDoc = (doc) => {
  const label = `${doc?.type || ''} ${doc?.typeLabel || ''}`.toLowerCase();
  return label.includes('schet') || label.includes('счет покупателю') || label.includes('счёт покупателю') || label.includes('счет на оплат') || label.includes('счёт на оплат') || label.includes('bill');
};
const isPaymentDoc = (doc) => {
  if (isInvoiceDoc(doc)) return false;
  const typeLabel = `${doc?.type || ''} ${doc?.typeLabel || ''}`.toLowerCase();
  const opLabel = `${doc?.opTitle || ''}`.toLowerCase();
  return doc?.type === 'payment'
    || typeLabel.includes('payment')
    || typeLabel.includes('платеж')
    || typeLabel.includes('платёж')
    || typeLabel.includes('поступление')
    || opLabel.includes('поступление оплаты')
    || opLabel.includes('оплата покупателя');
};
const isSfDoc = (doc) => {
  const label = `${doc?.type || ''} ${doc?.typeLabel || ''} ${doc?.erp?.num || ''} ${doc?.rc?.num || ''}`.toLowerCase();
  return label.includes('фактур') || label.includes('invoice') || /^сф[-\s]/i.test(doc?.erp?.num || '') || /^сф[-\s]/i.test(doc?.rc?.num || '');
};
const reimbursementKind = (doc) => {
  const value = Number(doc?.erp?.reimbursementId ?? doc?.reimbursementId ?? 0);
  if (value === 1) return 'reimb';
  if (value === 2) return 'non';
  return '';
};
const docStatusBadge = (status) => {
  if (status === 'match') return { key: 'ok', label: 'Совпало' };
  if (status === 'limited') return { key: 'limit', label: 'Строка 1С' };
  if (status === 'source-error') return { key: 'source-error', label: 'Ошибка 1С' };
  if (status === 'miss-1c') return { key: 'no1c', label: 'Нет в 1С' };
  if (status === 'miss-erp') return { key: 'noerp', label: 'Нет в ERP' };
  if (status === 'sum') return { key: 'sum', label: 'Сумма расходится' };
  if (status === 'vat') return { key: 'nosf', label: 'Вопрос по НДС' };
  if (status === 'no-sf') return { key: 'no-sf', label: 'Нет СФ/УПД' };
  if (status === 'fields') return { key: 'fields', label: 'Поля документа расходятся' };
  if (status === 'no-kod1c') return { key: 'nokey', label: 'Нет ключа 1С' };
  return { key: 'pending', label: 'Не сверено' };
};

const buildMatrixModel = () => {
  const snapshot = window.ERP_SNAPSHOT || {};
  if (snapshot.matrix_model && Array.isArray(snapshot.matrix_model.clients)) {
    return snapshot.matrix_model;
  }
  const deliveryRaw = snapshot.delivery || {};
  const delivery = window.DELIVERY || {};
  const docs = Array.isArray(window.DOCS) ? window.DOCS : [];
  const balance = snapshot.delivery_balance || {};
  const settlements = snapshot.settlements || {};
  const contracts = Array.isArray(snapshot.contracts) ? snapshot.contracts : [];
  const clientTree = snapshot.client_tree && typeof snapshot.client_tree === 'object' ? snapshot.client_tree : {};

  const specNumber = hasText(deliveryRaw.spec_number)
    ? deliveryRaw.spec_number
    : String(delivery.number || '').replace(/^Заявка\s*№?\s*/i, '') || delivery.id || '—';
  const mainDog = deliveryRaw.main_dog_number || delivery.container || compactList(contracts.map(c => c.dog_number), 'Без договора');
  const mainDogCode = deliveryRaw.main_dog_code1c || compactList(contracts.map(c => c.dog_code1c), '');
  const principalName = delivery.principal || deliveryRaw.org_name || compactList(contracts.map(c => c.org_name), 'Юридическое лицо');
  const clientName = delivery.client || deliveryRaw.client_name || 'Клиент не выбран';
  const clientInn = delivery.clientInn || deliveryRaw.client_inn || '';
  const deliveryLabel = delivery.number || (specNumber !== '—' ? `Заявка № ${specNumber}` : delivery.id);

  const badgesForDocs = (sourceDocs, delta, sfDocs) => {
    const issueCounts = sourceDocs.reduce((acc, doc) => {
      acc[doc.status] = (acc[doc.status] || 0) + 1;
      return acc;
    }, {});
    const rowBadges = [];
    if ((issueCounts['miss-1c'] || 0) > 0) rowBadges.push({ key: 'no1c', label: `Нет в 1С ${issueCounts['miss-1c']}` });
    if ((issueCounts['miss-erp'] || 0) > 0) rowBadges.push({ key: 'noerp', label: `Нет в ERP ${issueCounts['miss-erp']}` });
    if ((issueCounts.sum || 0) > 0) rowBadges.push({ key: 'sum', label: 'Сумма расходится' });
    else if (balanceLabel(delta)) rowBadges.push({ key: 'sum', label: balanceLabel(delta) });
    if ((issueCounts.vat || 0) > 0) rowBadges.push({ key: 'nosf', label: 'Вопрос по НДС' });
    if ((issueCounts['no-sf'] || 0) > 0) rowBadges.push({ key: 'no-sf', label: `Нет СФ/УПД ${issueCounts['no-sf']}` });
    if ((issueCounts.fields || 0) > 0) rowBadges.push({ key: 'fields', label: 'Расходятся реквизиты' });
    if ((issueCounts['source-error'] || 0) > 0) rowBadges.push({ key: 'source-error', label: 'Ошибка источника 1С' });
    if ((issueCounts.limited || 0) > 0) rowBadges.push({ key: 'limit', label: `Строка 1С ${issueCounts.limited}` });
    if ((issueCounts['no-kod1c'] || 0) > 0) rowBadges.push({ key: 'nokey', label: `Нет ключа 1С ${issueCounts['no-kod1c']}` });
    if ((issueCounts.pending || 0) > 0) rowBadges.push({ key: 'pending', label: `Не сверено ${issueCounts.pending}` });
    if (!rowBadges.length) rowBadges.push({ key: 'ok', label: 'ОК' });
    return rowBadges;
  };
  const totalsFromDocs = (sourceDocs, useSnapshotTotals = false) => {
    const invoiceDocs = sourceDocs.filter(isInvoiceDoc);
    const paymentDocs = sourceDocs.filter(isPaymentDoc);
    const sfDocs = sourceDocs.filter(isSfDoc);
    const reimbDocs = sourceDocs.filter(x => reimbursementKind(x) === 'reimb');
    const nonReimbDocs = sourceDocs.filter(x => reimbursementKind(x) === 'non');
    const pickMoney = (...values) => {
      for (const value of values) {
        if (value === undefined || value === null || String(value).trim() === '') continue;
        const number = moneyValue(value);
        if (Number.isFinite(number)) return number;
      }
      return null;
    };
    const invoiceSum = useSnapshotTotals
      ? (pickMoney(balance.client_invoice_total, settlements.invoice_total, settlements.buyer_invoice_total) ?? invoiceDocs.reduce((s, x) => s + docAmount(x), 0))
      : invoiceDocs.reduce((s, x) => s + docAmount(x), 0);
    const paymentSum = useSnapshotTotals
      ? (pickMoney(balance.client_payment_total, settlements.paid_total, settlements.classified_paid_total) ?? paymentDocs.reduce((s, x) => s + docAmount(x), 0))
      : paymentDocs.reduce((s, x) => s + docAmount(x), 0);
    const reimbursableSum = useSnapshotTotals
      ? (pickMoney(settlements.control_reimbursable_total, settlements.reimbursable_total) ?? reimbDocs.reduce((s, x) => s + docAmount(x), 0))
      : reimbDocs.reduce((s, x) => s + docAmount(x), 0);
    const nonReimbursableSum = useSnapshotTotals
      ? (pickMoney(settlements.control_non_reimbursable_total, settlements.non_reimbursable_total) ?? nonReimbDocs.reduce((s, x) => s + docAmount(x), 0))
      : nonReimbDocs.reduce((s, x) => s + docAmount(x), 0);
    const delta = useSnapshotTotals
      ? (pickMoney(settlements.customer_settlement_balance_rub, settlements.control_sheet_delta, balance.money_balance) ?? moneyValue(paymentSum - reimbursableSum - nonReimbursableSum))
      : moneyValue(paymentSum - reimbursableSum - nonReimbursableSum);
    return {
      invoiceLabel: multiLineList(invoiceDocs.map(docNumber), invoiceDocs.length ? `${invoiceDocs.length} счет(ов)` : '—'),
      invoiceSum,
      paymentSum,
      reimbursableSum,
      nonReimbursableSum,
      sfLabel: multiLineList(sfDocs.map(docNumber), '—'),
      delta,
      badges: badgesForDocs(sourceDocs, delta, sfDocs),
      showAmounts: true,
    };
  };
  const useSnapshotTotals = snapshot.source !== 'mock' && snapshot.sourceState !== 'mock';
  const totals = totalsFromDocs(docs, useSnapshotTotals);

  const detailDocsFor = (sourceDocs) => sourceDocs
    .slice()
    .sort((a, b) => String(docDate(a)).localeCompare(String(docDate(b))) || String(docNumber(a)).localeCompare(String(docNumber(b))))
    .map((doc, idx) => ({
      id: doc.id || `detail-${idx}`,
      type: doc.typeLabel || 'Документ',
      erp: doc.erp?.num || doc.erp?.kod1c || '—',
      onec: doc.rc?.num || doc.rc?.kod1c || '—',
      date: docDate(doc) || '—',
      amount: docAmount(doc),
      status: docStatusBadge(doc.status),
    }));

  const blankTotals = {
    invoiceLabel: '—',
    invoiceSum: null,
    paymentSum: null,
    reimbursableSum: null,
    nonReimbursableSum: null,
    sfLabel: '—',
    delta: null,
    badges: [],
    showAmounts: false,
  };
  const navigationTotals = (rowBadges = []) => ({ ...blankTotals, badges: rowBadges });
  const totalsFor = (active) => active ? totals : blankTotals;
  const correctionInfo = (doc) => {
    const numCandidate = [doc.correctNum, doc.erp?.correctNum, doc.rc?.correctNum]
      .find(v => v !== undefined && v !== null && String(v).trim() !== '');
    const idCandidate = [doc.correctId, doc.erp?.correctId, doc.rc?.correctId]
      .find(v => v !== undefined && v !== null && String(v).trim() !== '');
    const num = Number(numCandidate);
    const id = Number(idCandidate);
    return {
      num: Number.isFinite(num) && num > 0 ? num : 0,
      id: Number.isFinite(id) && id > 0 ? id : 0,
    };
  };
  const reportSlices = (() => {
    const groups = new Map();
    docs.forEach((doc) => {
      const info = correctionInfo(doc);
      const key = info.num > 0 ? `num-${info.num}` : info.id > 0 ? `id-${info.id}` : 'main';
      if (!groups.has(key)) groups.set(key, { key, info, docs: [] });
      groups.get(key).docs.push(doc);
    });
    if (!groups.size) groups.set('main', { key: 'main', info: { num: 0, id: 0 }, docs: [] });
    const groupCount = groups.size;
    return [...groups.values()]
      .sort((a, b) => {
        const av = a.key === 'main' ? -1 : (a.info.num || a.info.id || 0);
        const bv = b.key === 'main' ? -1 : (b.info.num || b.info.id || 0);
        return av - bv;
      })
      .map((slice) => {
        const isMain = slice.key === 'main';
        const label = isMain ? (groupCount > 1 ? 'Основной отчет' : `Спецификация ${specNumber}`) : (slice.info.num ? `Корректировка № ${slice.info.num}` : 'Корректировка');
        return {
          ...slice,
          label,
          note: isMain ? 'Основной отчет по поставке' : 'Дополнительный срез закрытия поставки',
          totals: groupCount === 1 && isMain ? totals : totalsFromDocs(slice.docs, false),
          detailDocs: detailDocsFor(slice.docs),
        };
      });
  })();
  const currentTree = clientTree.current || {};
  const currentLegalId = Number(currentTree.legal_entity_id || deliveryRaw.client_id || 0);
  const currentDogId = Number(currentTree.dog_id || deliveryRaw.main_dog_id || 0);
  const currentContractCodes = new Set([
    deliveryRaw.main_dog_code1c,
    deliveryRaw.spec_buyer_code1c,
    deliveryRaw.spec_principal_code1c,
    ...contracts.map(c => c.dog_code1c),
  ].map(x => String(x || '').trim()).filter(Boolean));
  const contact = clientTree.contact || {};
  const contactName = meaningfulLabel(contact.name) || meaningfulLabel(deliveryRaw.contact_name) || clientName;
  const contactInn = contact.inn || deliveryRaw.contact_inn || clientInn;
  const legalEntities = Array.isArray(clientTree.legal_entities) && clientTree.legal_entities.length
    ? clientTree.legal_entities
    : [{
        id: currentLegalId || deliveryRaw.client_id || clientName,
        name: clientName,
        abbr: deliveryRaw.client_abbr || '',
        inn: clientInn,
        code1c: '',
        is_current: true,
        contracts: [],
      }];
  const sortedLegalEntities = legalEntities.slice().sort((a, b) => {
    const aCurrent = Number(a.id || a.client_id || 0) === currentLegalId || a.is_current ? 0 : 1;
    const bCurrent = Number(b.id || b.client_id || 0) === currentLegalId || b.is_current ? 0 : 1;
    if (aCurrent !== bCurrent) return aCurrent - bCurrent;
    return String(meaningfulLabel(a.abbr) || meaningfulLabel(a.name)).localeCompare(String(meaningfulLabel(b.abbr) || meaningfulLabel(b.name)), 'ru');
  });

  const makeSpecRow = (level, slice) => ({
    id: `spec-${specNumber}-${slice.key}`,
    kind: 'spec',
    level,
    name: reportSlices.length > 1 ? slice.label : `Спецификация ${specNumber}`,
    note: reportSlices.length > 1
      ? `Спецификация ${specNumber} · ${slice.note}`
      : (delivery.route || deliveryRaw.goods_name || slice.note),
    specNo: specNumber,
    isParent: false,
    detailDocs: slice.detailDocs,
    defaultExpanded: false,
    ...slice.totals,
  });
  const makeDeliveryRow = (level) => ({
    id: `delivery-${specNumber}`,
    kind: 'delivery',
    level,
    name: `Поставка: ${deliveryLabel}`,
    note: [deliveryRaw.spec_date || delivery.date || '', delivery.route || deliveryRaw.goods_name || ''].filter(Boolean).join(' · '),
    specNo: reportSlices.length > 1 ? `${reportSlices.length} среза` : '1 спецификация',
    isParent: true,
    defaultExpanded: true,
    children: reportSlices.map(slice => makeSpecRow(level + 1, slice)),
    ...(reportSlices.length > 1 ? { ...totals, badges: [...totals.badges, { key: 'limit', label: 'Есть корректировки' }] } : totals),
  });
  const makeCurrentContractFromCurrentSelection = () => ({
    id: currentDogId || `contract-${mainDog}`,
    number: mainDog,
    code1c: mainDogCode,
    date: deliveryRaw.main_dog_date || '',
    type_name: 'Основной договор',
    org_abbr: deliveryRaw.org_abbr || '',
    org_name: principalName,
    org_inn: deliveryRaw.org_inn || delivery.principalInn || '',
    is_current: true,
  });
  const isCurrentContract = (contract, legalId) => {
    const contractId = Number(contract?.id || contract?.dog_id || 0);
    const numericLegalId = Number(legalId);
    const number = String(contract?.number || contract?.dog_number || '').trim();
    const code = String(contract?.code1c || contract?.dog_code1c || '').trim();
    const legalMatches = !currentLegalId || numericLegalId === currentLegalId;
    return legalMatches && (
      (currentDogId && contractId === currentDogId) ||
      (number && mainDog && number === mainDog) ||
      (code && currentContractCodes.has(code))
    );
  };
  const legalRows = sortedLegalEntities.map((legal, legalIdx) => {
    const legalId = Number(legal.id || legal.client_id || 0);
    const legalActive = legalId === currentLegalId || legal.is_current;
    const rawContracts = Array.isArray(legal.contracts) ? legal.contracts.slice() : [];
    if (legalActive && !rawContracts.some(c => isCurrentContract(c, legalId))) {
      rawContracts.unshift(makeCurrentContractFromCurrentSelection());
    }
    rawContracts.sort((a, b) => {
      const aCurrent = isCurrentContract(a, legalId) ? 0 : 1;
      const bCurrent = isCurrentContract(b, legalId) ? 0 : 1;
      if (aCurrent !== bCurrent) return aCurrent - bCurrent;
      return String(b.date || '').localeCompare(String(a.date || '')) || String(b.id || '').localeCompare(String(a.id || ''));
    });
    const contractRows = rawContracts.map((contract, contractIdx) => {
      const active = isCurrentContract(contract, legalId);
      const number = contract.number || contract.dog_number || 'Договор без номера';
      const code = contract.code1c || contract.dog_code1c || '';
      const orgLabel = contract.org_abbr || contract.org_name || principalName;
      const noteParts = [
        contract.type_name || contract.dog_type_name || '',
        contract.date ? `от ${contract.date}` : '',
        code ? `код 1С ${code}` : '',
        orgLabel ? `организация ${orgLabel}` : '',
      ].filter(Boolean);
      return {
        id: `contract-${legalId}-${contract.id || contract.dog_id || contractIdx}`,
        kind: 'contract',
        level: 2,
        name: `Договор: ${number}`,
        note: noteParts.join(' · ') || 'Договор ERP',
        specNo: active ? '1 поставка' : '—',
        isParent: active,
        defaultExpanded: active,
        children: active ? [makeDeliveryRow(3)] : [],
        ...(active ? totals : navigationTotals([])),
      };
    });
    const active = contractRows.some(row => row.children?.length);
    const legalName = meaningfulLabel(legal.abbr) || meaningfulLabel(legal.name) || `ЮЛ ${legalId || legalIdx + 1}`;
    const legalFullName = meaningfulLabel(legal.name);
    const legalNote = legal.inn ? `ИНН ${legal.inn}` : (legalFullName && legalFullName !== legalName ? legalFullName : '');
    return {
      id: `legal-${legalId || legalIdx}`,
      kind: 'legal',
      level: 1,
      name: `ЮЛ: ${legalName}`,
      note: legalNote,
      specNo: active ? '1 договор' : `${contractRows.length} договор(ов)`,
      isParent: contractRows.length > 0,
      defaultExpanded: active,
      children: contractRows,
      ...(active ? totals : navigationTotals([])),
    };
  });
  const clientRow = {
    id: `client-${contact.id || contactName}`,
    kind: 'client',
    level: 0,
    name: `Клиент: ${contactName}`,
    note: contactInn ? `ИНН ${contactInn}` : '',
    specNo: `${legalRows.length} ЮЛ`,
    isParent: true,
    defaultExpanded: true,
    children: legalRows,
    ...totals,
  };

  return {
    clients: [{ id: clientRow.id, name: contactName, inn: contactInn, root: clientRow }],
    totals,
    rowsCount: docs.length,
    sourceLabel: snapshot.sourceState === 'loaded' || snapshot.source === 'erp' ? 'ERP-данные' : 'Локальный пример',
  };
};

/* ===== Matrix page ===== */
const ReconciliationMatrixPage = ({ onBack, onOpenReport, lastReport, compareState, dataState }) => {
  const expectsUrlData = Boolean(getClientId() || getSpecId() || getFixtureName());
  const model = buildMatrixModel();
  const [selectedClient, setSelectedClient] = React.useState(() => model.clients[0]?.id || '');
  const [query, setQuery] = React.useState('');
  const [onlyIssues, setOnlyIssues] = React.useState(false);
  const [expanded, setExpanded] = React.useState(() => new Set(['client-', 'org-', 'contract-', 'delivery-']));
  const [copyState, setCopyState] = React.useState('');
  const clients = model.clients;
  const selected = clients.find(c => c.id === selectedClient) || clients[0];

  React.useEffect(() => {
    if (selected && selected.id !== selectedClient) setSelectedClient(selected.id);
  }, [selected?.id]);

  React.useEffect(() => {
    if (!selected?.root) return;
    const defaults = new Set();
    const walk = (row) => {
      if (row.isParent && row.defaultExpanded) defaults.add(row.id);
      (row.children || []).forEach(walk);
    };
    walk(selected.root);
    setExpanded(defaults);
  }, [selectedClient, model.sourceLabel]);

  if (expectsUrlData && dataState?.state === 'loading') {
    const loadingTitle = getClientId()
      ? `Загружаем live-матрицу по client_id ${getClientId()}`
      : 'Загружаем данные матрицы';
    const loadingHint = getClientId()
      ? `Выборка может занимать несколько минут: считаем до ${getMatrixLimit()} поставок через ERP-процедуры и сверяем с 1С Postgre.`
      : 'Ждем ответ ERP API.';
    return (
      <div className="page matrix-page">
        <div className="matrix-head">
          <div>
            <button className="btn ghost sm" onClick={onBack}><IconArrowLeft size={13}/>К поставке</button>
            <div className="matrix-title" style={{ marginTop: 12 }}>{loadingTitle}</div>
            <div className="matrix-sub">{loadingHint}</div>
          </div>
        </div>
        <div className="matrix-shell" style={{ padding: 24 }}>
          <div className="source-banner">
            <IconSearch size={15}/>
            <span>{dataState.message || 'Проверяем контекст ERP...'}</span>
          </div>
        </div>
      </div>
    );
  }
  if (expectsUrlData && dataState?.state === 'error') {
    return (
      <div className="page matrix-page">
        <div className="matrix-head">
          <div>
            <button className="btn ghost sm" onClick={onBack}><IconArrowLeft size={13}/>К поставке</button>
            <div className="matrix-title" style={{ marginTop: 12 }}>Матрица не загрузилась</div>
            <div className="matrix-sub">Live API не вернул данные. Для тяжелых договоров попробуйте меньший `limit`.</div>
          </div>
        </div>
        <div className="matrix-shell" style={{ padding: 24 }}>
          <div className="source-banner warn">
            <IconAlert size={15}/>
            <span>{dataState.message || 'Ошибка загрузки ERP API'}</span>
          </div>
        </div>
      </div>
    );
  }

  const toggle = (id) => {
    setExpanded(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const visibleRows = [];
  const addRows = (row) => {
    const blob = [row.name, row.note, row.specNo, row.invoiceLabel, row.sfLabel].join(' ').toLowerCase();
    const matchesQuery = !query || blob.includes(query.toLowerCase());
    const hasIssue = row.badges?.some(b => b.key !== 'ok');
    if (matchesQuery && (!onlyIssues || hasIssue || row.isParent)) visibleRows.push(row);
    if (row.children?.length && expanded.has(row.id)) row.children.forEach(addRows);
  };
  if (selected?.root) addRows(selected.root);

  const rowText = (row, value) => row.showAmounts === false ? '—' : (value || '—');
  const rowMoneyText = (row, key) => {
    if (row.showAmounts === false) return '—';
    const label = row[`${key}Label`];
    if (label !== undefined && label !== null && String(label).trim() !== '') return label;
    return fmtMoney(row[key]);
  };
  const totalMoneyText = (key) => {
    const label = model.totals?.[`${key}Label`];
    if (label !== undefined && label !== null && String(label).trim() !== '') return label;
    return fmtMoney(model.totals?.[key]);
  };
  const renderMoney = (row, key) => <span className="mono">{rowMoneyText(row, key)}</span>;
  const renderBadges = (badges) => (

  const badgeHint = (badge) => {
    const label = String(badge?.label || '');

    if (key === 'ok') return 'По этой строке не найдено расхождений.';
    if (key === 'sum' && (label.includes('Долг') || label.includes('Переплата'))) return 'Долг/переплата = сумма оплат - возмещаемые расходы - невозмещаемые расходы.';
    if (key === 'fields') return 'Расходятся контролируемые поля документа: номер, дата, договор, код 1С или другая связка.';
    if (key === 'no1c') return 'ERP-документ есть, но соответствующий документ 1С не найден в источнике сверки.';
    if (key === 'noerp') return 'Документ 1С есть, но соответствующая ERP-строка не найдена.';

    const total = Number(summary.total || 0);

    const match = Number(summary.MATCH || 0);
    const problems =
      Number(summary.NOT_FOUND_IN_1C || 0) +
      Number(summary.NOT_FOUND_IN_ERP || 0) +
      Number(summary.FIELDS_MISMATCH || 0) +
      Number(summary.NOT_COMPARABLE || 0);
    return problems
      ? `Сверка с 1С: ${match} из ${total} совпало, отклонений ${problems}`

  const deltaClass = (value) => moneyValue(value) > 0.01 ? 'pos' : moneyValue(value) < -0.01 ? 'neg' : '';
  const matrixColumns = [
    'Иерархия',
    '№ спецификации',
    'Счет',
    'Сумма по счету',
    'Сумма оплаты',
    'Возмещаемые расходы',
    'Невозмещаемые расходы',
    '№ счф',
    '(+/-)',
    'Статус',

  const serializeMatrix = (separator) => {
    const clean = (value) => String(value ?? '').replace(/\s+/g, ' ').trim();
    const quote = (value) => {
      const text = clean(value);
      return separator === ';' ? `"${text.replace(/"/g, '""')}"` : text.replace(/\t/g, ' ');
    };
    return [
      matrixColumns.join(separator),
      ...exportRows.map(row => matrixColumns.map(col => quote(row[col])).join(separator)),
    ].join('\n');
  };
  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(serializeMatrix('\t'));
      setCopyState('Скопировано');
    } catch (err) {
      console.warn('Matrix copy failed', err);

  const handleExport = async () => {

      const dogId = getDogId();

          </button>
          <button className="btn sm" onClick={handleCopy}><IconCopy size={13}/>{copyState || 'Скопировать'}</button>
          <button className="btn brand" onClick={handleExport} title="Скачать бухгалтерскую форму .xlsx"><IconDownload size={14}/>Выгрузить XLSX</button>
        </div>

      <div className="matrix-controls">

        </div>
      </div>

      <div className="matrix-kpis">
        <div className="matrix-kpi"><div className="v mono">{totalMoneyText('invoiceSum')}</div><div className="l">Сумма по счетам</div></div>
        <div className="matrix-kpi"><div className="v mono">{totalMoneyText('paymentSum')}</div><div className="l">Сумма оплат</div></div>
        <div className="matrix-kpi"><div className="v mono">{totalMoneyText('reimbursableSum')}</div><div className="l">Возмещаемые расходы</div></div>
        <div className="matrix-kpi"><div className="v mono">{totalMoneyText('nonReimbursableSum')}</div><div className="l">Невозмещаемые расходы</div></div>
        <div className="matrix-kpi"><div className={`v mono ${deltaClass(model.totals.delta)}`}>{totalMoneyText('delta')}</div><div className="l">(+/-) оплат-расходы</div></div>

              <col style={{ width: '9.5%' }}/>
              <col style={{ width: '10%' }}/>
              <col style={{ width: '10.5%' }}/>
              <col style={{ width: '10%' }}/>
              <col style={{ width: '7%' }}/>
              <col style={{ width: '9.5%' }}/>

              <tr>

                <th><span className="th-wrap">Счет</span></th>
                <th style={{ textAlign: 'right' }}><span className="th-wrap">Сумма<br/>по счету</span></th>
                <th style={{ textAlign: 'right' }}><span className="th-wrap">Сумма<br/>оплаты</span></th>
                <th style={{ textAlign: 'right' }}><span className="th-wrap">Возм.<br/>расходы</span></th>
                <th style={{ textAlign: 'right' }}><span className="th-wrap">Невозм.<br/>расходы</span></th>
                <th><span className="th-wrap">№<br/>счф</span></th>
                <th style={{ textAlign: 'right' }}><span className="th-wrap">(+/-)<br/>опл.-расх.</span></th>
                <th><span className="th-wrap">Статус</span></th>
              </tr>
            </thead>
            <tbody>
              {visibleRows.map(row => (
                <React.Fragment key={row.id}>
                  <tr className={`matrix-row level-${row.level} ${row.isParent ? 'parent' : 'spec'}`}>

                      <div className="matrix-label" style={{ '--level': row.level }}>
                        <span className="matrix-indent"/>
                        {(row.children?.length || row.detailDocs?.length) ? (
                          <button className="matrix-expander" onClick={() => toggle(row.id)} title={expanded.has(row.id) ? 'Свернуть' : 'Развернуть'}>
                            <IconChevron size={13} style={{ transform: expanded.has(row.id) ? 'rotate(180deg)' : '', transition: 'transform 0.15s' }}/>
                          </button>
                        ) : <span className="matrix-expander"/>}
                        <div className="matrix-main">
                          <div className="matrix-name">{row.name}</div>
                          <div className="matrix-meta-line">
                            {row.note && <div className="matrix-note">{row.note}</div>}
                          </div>
                        </div>
                      </div>
                    </td>
                    <td className="mono">{row.specNo || '—'}</td>
                    <td className="mono">{rowText(row, row.invoiceLabel)}</td>
                    <td className="money">{renderMoney(row, 'invoiceSum')}</td>
                    <td className="money">{renderMoney(row, 'paymentSum')}</td>
                    <td className="money">{renderMoney(row, 'reimbursableSum')}</td>
                    <td className="money">{renderMoney(row, 'nonReimbursableSum')}</td>
                    <td className="mono sf-cell"><div className="sf-lines">{rowText(row, row.sfLabel)}</div></td>
                    <td className={`delta ${row.showAmounts === false ? '' : deltaClass(row.delta)}`}>{renderMoney(row, 'delta')}</td>
                    <td className="matrix-status-cell">{renderBadges(row.badges)}</td>
                  </tr>
                  {row.kind === 'spec' && expanded.has(row.id) && (
                    <tr className="matrix-row detail-host">
                      <td colSpan="10">
                        <div className="matrix-detail">
                          <div className="matrix-detail-title">Документы внутри спецификации · {reconciliationStatusText(row)}</div>
                          <div className="matrix-detail-grid">
                            <div className="matrix-detail-head">Статус проверки</div>
                            <div className="matrix-detail-head">Тип</div>
                            <div className="matrix-detail-head">ERP</div>
                            <div className="matrix-detail-head">1С</div>
                            <div className="matrix-detail-head">Дата</div>
                            <div className="matrix-detail-head">Сумма</div>
                            {row.detailDocs.map(detail => (
                              <React.Fragment key={detail.id}>
                                <div><span className={`matrix-badge ${detail.status.key}`}>{detail.status.label}</span></div>
                                <div>{detail.type}</div>
                                <div className="mono">{detail.erp}</div>
                                <div className="mono">{detail.onec}</div>
                                <div className="mono">{detail.date}</div>
                                <div className="mono">{fmtMoney(detail.amount)}</div>
                              </React.Fragment>
                            ))}
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              ))}
            </tbody>
          </table>
          {visibleRows.length === 0 && <div className="matrix-empty">Нет строк по выбранному фильтру</div>}
        </div>
      </div>
    </div>
  );
};

// Delivery card screen — entry point with "Сверить с 1С" CTA
const DeliveryCard = ({ onStart, onOpenMatrix, lastReport, dataState, compareState }) => {
  const d = window.DELIVERY;
  const docs = window.DOCS;
  const snapshot = window.ERP_SNAPSHOT || {};
  const balance = snapshot.delivery_balance || {};
  const contracts = Array.isArray(snapshot.contracts) ? snapshot.contracts : [];
  const erpDocPriority = (x) => {
    if (x.typeLabel === 'Счет покупателю' || (x.type === 'schet' && !x.erp?.invoice)) return 0;
    if (x.type === 'payment' || /оплат/i.test(x.typeLabel || '')) return 1;
    if (x.erp?.kod1c) return 2;
    return 3;
  };
  const erpDocs = docs
    .filter(x => x.erp && !x.erp.isDetailLine)
    .sort((a, b) => erpDocPriority(a) - erpDocPriority(b) || String(a.erp?.date || '').localeCompare(String(b.erp?.date || '')));
  const stats = {
    ops: new Set(docs.map(x => x.opId)).size,
    erpDocs: erpDocs.length,
    expected1c: docs.filter(x => x.rc).length,
    matched: lastReport ? docs.filter(x => x.status === 'match').length : null,
  };
  const xlsxUrl = snapshot.xlsx_url ? apiUrl(snapshot.xlsx_url) : null;
  const comparing = compareState?.state === 'loading';
  const currentBalanceSnapshot = balanceSnapshot();
  const lastBalance = lastReport?.balanceSnapshot || null;
  const balanceChangedAfterReport = !!(lastBalance && lastBalance.signature !== currentBalanceSnapshot.signature);

// Progress screen — 3 stages (collect codes → request 1C → match)
const ReconcileProgress = ({ onDone, onCancel }) => {
  const [stage, setStage] = React.useState(0); // 0,1,2
  const [stageProg, setStageProg] = React.useState(0); // 0..100 for current
  const [logCount, setLogCount] = React.useState(0);
  const log = window.PROGRESS_LOG;

  React.useEffect(() => {
    if (stage >= 3) { const t = setTimeout(onDone, 600); return () => clearTimeout(t); }
    const tick = setInterval(() => {
      setStageProg(p => {
        if (p >= 100) {
          clearInterval(tick);
          setStage(s => s + 1);
          return 0;
        }
        return p + (stage === 2 ? 4 : stage === 1 ? 2.8 : 6);
      });
    }, 55);
    return () => clearInterval(tick);
  }, [stage]);

  React.useEffect(() => {
    if (logCount >= log.length) return;
    const delay = 140 + Math.random() * 140;
    const t = setTimeout(() => setLogCount(c => c + 1), delay);
    return () => clearTimeout(t);
  }, [logCount]);

  const stages = [
    { num: '01', title: 'Сбор кодов 1С', desc: 'Из спецификации и привязанных операций' },
    { num: '02', title: 'Запрос в 1С', desc: 'Read-only REST, получение документов по кодам' },
    { num: '03', title: 'Сопоставление', desc: 'Поиск совпадений и расхождений' },
  ];

  return (
    <div className="page">
      <div className="progress-wrap">
        <div className="progress-head">
          <div className="progress-title">Сверяем документы с 1С</div>
          <div className="progress-sub">Поставка {window.DELIVERY.number} · {window.DELIVERY.client}</div>
        </div>

        <div className="stages">
          {stages.map((s, i) => {
            const done = i < stage;
            const active = i === stage;
            const width = done ? 100 : active ? stageProg : 0;
            return (
              <div key={i} className={`stage ${done ? 'done' : ''} ${active ? 'active' : ''}`}>
                <div className="stage-icon">
                  {done ? <IconCheck size={18}/> : active ? <IconSpinner size={18}/> : <span className="mono" style={{ fontSize: 13, fontWeight: 600 }}>{s.num}</span>}
                </div>
                <div className="stage-num mono">Этап {s.num}</div>
                <div className="stage-title">{s.title}</div>
                <div className="stage-desc">{s.desc}</div>
                <div className="stage-progress"><span style={{ width: `${width}%` }}/></div>
              </div>
            );
          })}
        </div>

        <div className="progress-log">
          {log.slice(0, logCount).map((l, i) => (
            <div key={i} className="line">
              <span className="ts">[{l.t}]</span>
              <span className={l.tag === 'ok' ? 'tag-ok' : l.tag === 'warn' ? 'tag-warn' : 'tag-info'}>
                {l.tag === 'ok' ? '✓' : l.tag === 'warn' ? '⚠' : '›'}
              </span>
              <span>{l.msg}</span>
            </div>
          ))}
          {logCount < log.length && <div className="line" style={{ color: 'var(--muted-2)' }}><span className="ts">...</span><span/></div>}
        </div>

        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 18 }}>
          <button className="btn ghost" onClick={onCancel}>Отменить</button>
          <div className="muted" style={{ fontSize: 12, alignSelf: 'center' }}>
            {stage >= 3 ? 'Готово' : `Этап ${Math.min(stage + 1, 3)} из 3`}
          </div>
        </div>
      </div>
    </div>
  );
};

window.ReconcileProgress = ReconcileProgress;

// Single reconciliation row — two-column layout with connecting line
const ReportRow = ({ rec, expanded, onToggle, onOpenDrawer, onCopy, onGotoOp, onLink }) => {
  const meta = window.STATUS_META[rec.status];
  const hasErp = !!rec.erp;
  const has1c = !!rec.rc;
  const diff = rec.diffFields || [];
  const showLines = document.body.getAttribute('data-show-lines') !== 'false';

  const LineSVG = () => {
    // connector between ERP and 1C panels
    const stroke =
      rec.status === 'match' ? 'var(--match)' :
      rec.status === 'miss-erp' ? 'var(--miss-erp)' :
      rec.status === 'miss-1c' ? 'var(--miss-1c)' :
      rec.status === 'sum' ? 'var(--sum-mismatch)' :
      rec.status === 'vat' ? 'var(--vat)' : 'var(--border-strong)';
    const dash = rec.status === 'match' ? '' : '4 4';
    return (
      <svg width="72" height="50" viewBox="0 0 72 50">
        <line x1="0" y1="25" x2="72" y2="25" stroke={stroke} strokeWidth="1.5" strokeDasharray={dash}/>
        <circle cx="36" cy="25" r="10" fill="var(--surface)" stroke={stroke} strokeWidth="1.5"/>
        {rec.status === 'match' ? (
          <path d="M31 25 l4 4 l7 -8" stroke={stroke} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        ) : rec.status === 'miss-erp' || rec.status === 'miss-1c' ? (
          <>
            <path d="M32 20 l8 10 M40 20 l-8 10" stroke={stroke} strokeWidth="1.8" strokeLinecap="round"/>
          </>
        ) : rec.status === 'sum' ? (
          <text x="36" y="29" textAnchor="middle" fontSize="12" fontWeight="700" fill={stroke} fontFamily="JetBrains Mono">≠</text>
        ) : (
          <text x="36" y="29" textAnchor="middle" fontSize="9" fontWeight="700" fill={stroke} fontFamily="Inter Tight">?</text>
        )}
      </svg>
    );
  };

  const Side = ({ side, data }) => {
    if (!data) {
      const msg = side === 'erp'
        ? (rec.skipReason || 'Не найдено в ЕРП')
        : 'Не найдено в 1С';
      return (
        <div className={`rec-side ${side === 'erp' ? 'left' : 'right'} empty`}>
          <div className="empty-msg">
            <IconAlert size={14} stroke={side === 'erp' ? 'oklch(0.58 0.13 75)' : 'oklch(0.56 0.15 45)'}/>
            <strong style={{ color: 'var(--ink-2)', fontSize: 12 }}>{side === 'erp' ? 'Нет в ЕРП' : 'Нет в 1С'}</strong>
          </div>
          <div style={{ fontSize: 11.5, lineHeight: 1.5 }}>{msg}</div>
          {side === 'erp' && rec.rc && (
            <button className="btn xs" style={{ marginTop: 4 }} onClick={(e) => { e.stopPropagation(); onLink(rec); }}>
              <IconLink size={11}/> Привязать к операции
            </button>
          )}
        </div>
      );
    }
    const isDiff = (f) => diff.includes(f);
    return (
      <div className={`rec-side ${side === 'erp' ? 'left' : 'right'}`}>
        <div className="doc-line-head">
          <span className="pill-sm">{data.doctype || rec.typeLabel}</span>
          {side === 'erp' && data.isAggregated && <span className="pill-sm">Сводно</span>}
          <span className="doc-num mono">{data.num}</span>
        </div>
        <div className="doc-meta">
          <span>
            <span className="k">дата:</span>
            <span className={`v ${isDiff('date') ? 'diff' : ''}`}>{data.date}</span>
          </span>
          <span>
            <span className="k">сумма:</span>
            <span className={`v ${isDiff('amount') && side === 'erp' ? 'diff' : isDiff('amount') && side === 'rc' ? 'fix' : ''}`}>{fmtMoney(data.amount, data.currency)}</span>
          </span>
          <span>
            <span className="k">НДС:</span>
            <span className={`v ${isDiff('vat') ? (side === 'erp' ? 'diff' : 'fix') : ''}`}>{data.vat}</span>
          </span>
          <span>
            <span className="code1c">
              {data.kod1c}
              <span className="copy" onClick={(e) => { e.stopPropagation(); onCopy(data.kod1c); }} title="Скопировать код 1С"><IconCopy size={11}/></span>
            </span>
          </span>
        </div>
      </div>
    );
  };

  return (
    <>
      <div className={`rec-row ${expanded ? 'expanded' : ''}`} onClick={onToggle}>
        <Side side="erp" data={rec.erp}/>
        <div className="rec-link">{showLines ? <LineSVG/> : <div style={{ width: 1, height: 36, background: 'var(--border)' }}/>}</div>
        <Side side="rc" data={rec.rc}/>

        <div className="rec-status-cell">
          <span className={`chip ${meta.color}`}><span className="dot"/>{meta.label}</span>
          {rec.diffNote && <span className="detail">{rec.diffNote}</span>}
        </div>

        <div className="rec-actions" onClick={(e) => e.stopPropagation()}>
          {hasErp && (
            <button className="icon-btn" title="Открыть операцию в ЕРП" onClick={() => onGotoOp(rec.opId)}><IconExternal size={14}/></button>
          )}
          {has1c && (
            <button className="icon-btn" title="Скопировать код 1С" onClick={() => onCopy(rec.rc.kod1c)}><IconCopy size={14}/></button>
          )}
          <button className="icon-btn" title="Подробнее" onClick={onOpenDrawer}><IconMore size={14}/></button>
          <button className="icon-btn" title={expanded ? 'Свернуть' : 'Развернуть'} onClick={onToggle}><IconChevron size={14} style={{ transform: expanded ? 'rotate(180deg)' : '', transition: 'transform 0.15s' }}/></button>
        </div>
      </div>

      {expanded && (
        <div className="rec-detail">
          <div>
            <h4><IconBox size={12}/> ЕРП (операция {rec.opId})</h4>
            {rec.erp ? (
              <dl className="kv">
                <dt>Операция</dt><dd>{rec.opTitle}</dd>
                <dt>Документ</dt><dd>{rec.typeLabel} <span className="mono">{rec.erp.num}</span></dd>
                <dt>Дата</dt><dd className="mono">{rec.erp.date}</dd>
                <dt>Сумма</dt><dd className="mono">{fmtMoney(rec.erp.amount, rec.erp.currency)}</dd>
                <dt>НДС</dt><dd>{rec.erp.vat}</dd>
                <dt>Код 1С</dt><dd><span className="code1c">{rec.erp.kod1c}</span></dd>
                {rec.erp.isAggregated && (
                  <>
                    <dt>Агрегация</dt><dd>{rec.erp.aggregationNote || `Сводно по ${rec.erp.docCount || 0} ERP-документам`}</dd>
                  </>
                )}
              </dl>
            ) : (
              <div className="muted" style={{ fontSize: 12 }}>Документ в ЕРП отсутствует</div>
            )}
          </div>
          <div>
            <h4><IconReceipt size={12}/> 1С</h4>
            {rec.rc ? (
              <dl className="kv">
                <dt>Документ</dt><dd>{rec.rc.doctype} <span className="mono">{rec.rc.num}</span></dd>
                <dt>Дата</dt><dd className="mono">{rec.rc.date}</dd>
                <dt>Сумма</dt><dd className="mono">{fmtMoney(rec.rc.amount)}</dd>
                <dt>НДС</dt><dd>{rec.rc.vat}</dd>

              </dl>

              <div className="muted" style={{ fontSize: 12 }}>В 1С по коду не найдено</div>
            )}
